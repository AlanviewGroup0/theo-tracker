<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Theo Tracker — what t3.gg is talking about</title>
<meta name="description" content="A daily digest of everything Theo (t3.gg) is talking about on X and YouTube." />
<style>
  :root{
    --bg:#0b0c10; --panel:#14161d; --panel2:#1b1e27; --line:#262a36;
    --txt:#e7e9ee; --muted:#9aa1b0; --accent:#7c5cff; --accent2:#19c2a8;
    --pink:#ff5c8a; --amber:#ffb454;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,#1a1340 0%,transparent 60%),var(--bg);color:var(--txt);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--accent2);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1060px;margin:0 auto;padding:28px 20px 80px}
  header.top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .avatar{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:grid;place-items:center;font-weight:800;font-size:22px;color:#fff;box-shadow:0 6px 24px rgba(124,92,255,.4)}
  h1{font-size:26px;margin:0;letter-spacing:-.4px}
  .sub{color:var(--muted);font-size:13.5px;margin-top:2px}
  .pillbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 26px}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:12.5px;color:var(--muted)}
  .pill b{color:var(--txt)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:30px}
  .stat{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:16px}
  .stat .n{font-size:24px;font-weight:800;letter-spacing:-.5px}
  .stat .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px;margin-top:3px}
  h2{font-size:14px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);margin:34px 0 14px;font-weight:700}
  .hl{display:flex;gap:14px;padding:16px;background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:11px}
  .hl .tag{flex:0 0 auto;align-self:flex-start;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:5px 10px;border-radius:8px;background:rgba(124,92,255,.16);color:#b7a6ff;border:1px solid rgba(124,92,255,.3)}
  .hl h3{margin:0 0 4px;font-size:15.5px}
  .hl p{margin:0;color:var(--muted);font-size:14px}
  .cols{display:grid;grid-template-columns:1.3fr 1fr;gap:22px}
  @media(max-width:820px){.cols{grid-template-columns:1fr}}
  .tweet{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:10px}
  .tweet .meta{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--muted);margin-bottom:6px}
  .tweet .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;padding:2px 7px;border-radius:6px;border:1px solid var(--line)}
  .k.reply{color:var(--amber)} .k.quote{color:var(--accent2)} .k.post{color:#b7a6ff}
  .tweet .body{font-size:14px;white-space:pre-wrap}
  .tweet .eng{margin-top:8px;font-size:12px;color:var(--muted)}
  .vid{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:12px}
  .vid .vt{font-weight:700;font-size:14.5px;margin-bottom:4px}
  .vid .vm{font-size:12px;color:var(--muted);margin-bottom:8px}
  .vid .vs{font-size:13.5px;color:#cfd3dc}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .chip{font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:3px 9px}
  footer{margin-top:50px;color:var(--muted);font-size:12.5px;border-top:1px solid var(--line);padding-top:18px}
  .note{background:rgba(255,180,84,.08);border:1px solid rgba(255,180,84,.25);color:#ffd9a8;border-radius:10px;padding:11px 13px;font-size:12.5px;margin-top:14px}
  .loading{color:var(--muted);padding:40px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="avatar">T</div>
    <div>
      <h1>Theo Tracker</h1>
      <div class="sub">Everything <a href="https://x.com/theo" target="_blank" rel="noopener">@theo</a> (t3.gg) is talking about — auto-updated daily</div>
    </div>
  </header>
  <div class="pillbar" id="pillbar"></div>

  <div id="app"><div class="loading">Loading digest…</div></div>

  <footer id="footer"></footer>
</div>

<script>
const fmt = n => n>=1e6 ? (n/1e6).toFixed(1)+'M' : n>=1e3 ? (n/1e3).toFixed(1)+'K' : (''+n);
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const linkify = s => esc(s).replace(/https?:\/\/[^\s]+/g,u=>`<a href="${u}" target="_blank" rel="noopener">${u.replace(/^https?:\/\//,'')}</a>`).replace(/#(\w+)/g,'<span style="color:#b7a6ff">#$1</span>').replace(/@(\w+)/g,'<a href="https://x.com/$1" target="_blank" rel="noopener">@$1</a>');
const dt = iso => new Date(iso).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});

fetch('./data.json?cb='+Date.now()).then(r=>r.json()).then(d=>{
  const m=d.meta;
  document.getElementById('pillbar').innerHTML =
    `<span class="pill">📅 Digest: <b>${esc(m.dayLabel)}</b></span>`+
    `<span class="pill">🕒 Updated <b>${dt(m.generatedAt)}</b></span>`+
    `<span class="pill">📡 ${m.sources.map(esc).join(' · ')}</span>`;

  const c=d.twitter.counts;
  const stats=[['Posts',c.posts],['Replies',c.replies],['Quotes',c.quotes],['Retweets',c.retweets],['Likes',fmt(c.totalLikes)],['Views',fmt(c.totalViews)]];

  let html = `<div class="grid">`+stats.map(s=>`<div class="stat"><div class="n">${s[1]}</div><div class="l">${s[0]}</div></div>`).join('')+`</div>`;

  html += `<h2>What he's talking about — ${esc(d.twitter.window)}</h2>`;
  html += d.highlights.map(h=>`<div class="hl"><span class="tag">${esc(h.tag)}</span><div><h3>${esc(h.title)}</h3><p>${linkify(h.detail)}</p></div></div>`).join('');

  html += `<div class="cols"><div><h2>Top posts</h2>`;
  html += d.twitter.topTweets.map(t=>`<div class="tweet"><div class="meta"><span class="k ${t.kind}">${t.kind}${t.quoted?' · '+esc(t.quoted):''}</span><span>${dt(t.date)}</span></div><div class="body">${linkify(t.text)}</div><div class="eng">❤ ${fmt(t.likes)} &nbsp; 👁 ${fmt(t.views)} &nbsp; <a href="${t.url}" target="_blank" rel="noopener">open</a></div></div>`).join('');
  html += `</div><div><h2>Recent videos / streams</h2>`;
  html += d.youtube.videos.map(v=>`<div class="vid"><div class="vt"><a href="https://youtube.com/watch?v=${v.videoId}" target="_blank" rel="noopener">${esc(v.title)}</a></div><div class="vm">${esc(v.date)} · ${v.durationMin}m</div><div class="vs">${esc(v.summary)}</div><div class="chips">${v.topics.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div></div>`).join('');
  html += `</div></div>`;

  if(m.note) html += `<div class="note">ℹ️ ${esc(m.note)}</div>`;

  document.getElementById('app').innerHTML = html;
  document.getElementById('footer').innerHTML = `Auto-generated digest of public X &amp; YouTube activity for <a href="${m.subject.x}" target="_blank" rel="noopener">@${esc(m.subject.handle)}</a>. Not affiliated with Theo. · Last build ${dt(m.generatedAt)}`;
}).catch(e=>{document.getElementById('app').innerHTML='<div class="loading">Failed to load data.json — '+esc(e.message)+'</div>';});
</script>
</body>
</html>
