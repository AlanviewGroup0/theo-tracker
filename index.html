<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TechPulse — tech & AI digest from the builders you follow</title>
<meta name="description" content="A daily tech & AI news digest and hot takes from the people you follow on X. Click a story to see what different people are saying." />
<style>
  :root{
    --bg:#0a0b0f; --panel:#13151c; --panel2:#191c25; --line:#262a36; --line2:#323748;
    --txt:#eceef3; --muted:#9aa1b0; --muted2:#6f7686; --accent:#7c5cff; --accent2:#19c2a8; --pink:#ff5c8a; --amber:#ffb454;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1100px 520px at 82% -12%,#1a1340 0%,transparent 58%),var(--bg);color:var(--txt);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--accent2);text-decoration:none} a:hover{text-decoration:underline}
  .wrap{max-width:1080px;margin:0 auto;padding:26px 20px 90px}
  header.top{display:flex;align-items:center;gap:15px;flex-wrap:wrap}
  .logo{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--pink));display:grid;place-items:center;font-weight:800;font-size:24px;color:#fff;box-shadow:0 6px 24px rgba(124,92,255,.4)}
  h1{font-size:25px;margin:0;letter-spacing:-.5px}
  .sub{color:var(--muted);font-size:13.5px;margin-top:2px}
  .pillbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 8px}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:12.5px;color:var(--muted)}
  .pill b{color:var(--txt)}
  .filters{display:flex;gap:7px;flex-wrap:wrap;margin:18px 0 22px}
  .chip{cursor:pointer;font-size:12.5px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 12px;user-select:none;transition:.15s}
  .chip:hover{border-color:var(--line2);color:var(--txt)}
  .chip.active{background:rgba(124,92,255,.16);border-color:rgba(124,92,255,.45);color:#cdbcff}
  h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);margin:30px 0 14px;font-weight:700}
  .story{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:15px;margin-bottom:13px;overflow:hidden;transition:.15s}
  .story:hover{border-color:var(--line2)}
  .story.open{border-color:rgba(124,92,255,.4)}
  .shead{display:flex;gap:14px;align-items:flex-start;padding:16px 18px;cursor:pointer}
  .scat{flex:0 0 auto;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:5px 9px;border-radius:8px;background:rgba(124,92,255,.15);color:#b7a6ff;border:1px solid rgba(124,92,255,.28);white-space:nowrap;margin-top:1px}
  .stitle{flex:1;min-width:0}
  .stitle h3{margin:0 0 4px;font-size:16.5px;letter-spacing:-.2px}
  .stitle p{margin:0;color:var(--muted);font-size:13.5px}
  .smeta{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:7px;margin-top:1px}
  .voices{display:flex;align-items:center}
  .voices img{width:24px;height:24px;border-radius:50%;border:2px solid var(--panel);margin-left:-8px;background:#222;object-fit:cover}
  .voices img:first-child{margin-left:0}
  .vcount{font-size:12px;color:var(--muted);white-space:nowrap}
  .vcount b{color:var(--accent2)}
  .caret{color:var(--muted2);font-size:13px;transition:.2s}
  .story.open .caret{transform:rotate(180deg)}
  .takes{display:none;padding:2px 18px 16px;border-top:1px solid var(--line)}
  .story.open .takes{display:block}
  .take{display:flex;gap:11px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.04)}
  .take:last-child{border-bottom:none}
  .take img{width:38px;height:38px;border-radius:50%;flex:0 0 auto;background:#222;object-fit:cover}
  .tk{flex:1;min-width:0}
  .tk .name{font-weight:700;font-size:14px}
  .tk .h{color:var(--muted2);font-size:12.5px;font-weight:400}
  .tk .body{font-size:14px;white-space:pre-wrap;margin:3px 0 5px;word-wrap:break-word}
  .tk .eng{font-size:12px;color:var(--muted2)}
  .hot{columns:2;column-gap:13px}
  @media(max-width:720px){.hot{columns:1}.smeta .voices{display:none}}
  .hotcard{break-inside:avoid;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:13px}
  .hotcard .body{font-size:14px;white-space:pre-wrap;margin:7px 0}
  .hh{display:flex;gap:9px;align-items:center}
  .hh img{width:30px;height:30px;border-radius:50%;background:#222;object-fit:cover}
  .hh .name{font-weight:700;font-size:13.5px}
  .hh .h{color:var(--muted2);font-size:12px}
  .people{display:flex;flex-wrap:wrap;gap:8px}
  .person{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px 11px 4px 4px;font-size:12.5px}
  .person img{width:22px;height:22px;border-radius:50%;background:#222;object-fit:cover}
  footer{margin-top:48px;color:var(--muted2);font-size:12.5px;border-top:1px solid var(--line);padding-top:18px}
  .note{background:rgba(124,92,255,.07);border:1px solid rgba(124,92,255,.22);color:#cdbcff;border-radius:10px;padding:11px 13px;font-size:12.5px;margin:6px 0 4px}
  .loading{color:var(--muted);padding:50px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="logo">⚡</div>
    <div>
      <h1>TechPulse</h1>
      <div class="sub">Tech &amp; AI news, hot takes, and who's saying what — from the builders you follow</div>
    </div>
  </header>
  <div class="pillbar" id="pillbar"></div>
  <div class="note" id="note"></div>
  <div class="filters" id="filters"></div>
  <div id="app"><div class="loading">Loading digest…</div></div>
  <footer id="footer"></footer>
</div>

<script>
const fmt=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':(''+(n||0));
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const linkify=s=>esc(s).replace(/https?:\/\/[^\s]+/g,u=>`<a href="${u}" target="_blank" rel="noopener">${u.replace(/^https?:\/\//,'').slice(0,28)}…</a>`).replace(/#(\w+)/g,'<span style="color:#b7a6ff">#$1</span>').replace(/@(\w+)/g,'<a href="https://x.com/$1" target="_blank" rel="noopener">@$1</a>');
const av=u=>u?u.replace('_normal','_x96'):'';
let DATA=null, FILTER='All';

function takeHTML(t){
  return `<div class="take"><img src="${esc(av(t.avatar))}" loading="lazy" alt=""/><div class="tk">
    <div><span class="name">${esc(t.name)}</span> <a class="h" href="https://x.com/${esc(t.handle)}" target="_blank" rel="noopener">@${esc(t.handle)}</a></div>
    <div class="body">${linkify(t.text)}</div>
    <div class="eng">❤ ${fmt(t.likes)} &nbsp; 👁 ${fmt(t.views)} &nbsp; <a href="${t.url}" target="_blank" rel="noopener">view on X →</a></div>
  </div></div>`;
}
function storyHTML(s){
  const faces=s.takes.slice(0,5).map(t=>`<img src="${esc(av(t.avatar))}" loading="lazy" alt=""/>`).join('');
  const vlabel=s.participants>1?`<b>${s.participants}</b> people talking`:`1 voice · ${s.takes.length} posts`;
  return `<div class="story" data-cat="${esc(s.category)}" data-id="${esc(s.id)}">
    <div class="shead" onclick="toggle('${esc(s.id)}')">
      <span class="scat">${esc(s.category)}</span>
      <div class="stitle"><h3>${esc(s.title)}</h3><p>${esc(s.summary)}</p></div>
      <div class="smeta"><div class="voices">${faces}</div><div class="vcount">${vlabel} <span class="caret">▾</span></div></div>
    </div>
    <div class="takes">${s.takes.map(takeHTML).join('')}</div>
  </div>`;
}
function toggle(id){
  const el=document.querySelector(`.story[data-id="${id}"]`);
  if(el) el.classList.toggle('open');
}
function render(){
  const stories=FILTER==='All'?DATA.stories:DATA.stories.filter(s=>s.category===FILTER);
  let html=`<h2 class="sec">📰 Stories — ${esc(DATA.meta.window)} <span style="color:var(--muted2);font-weight:400;text-transform:none;letter-spacing:0"> · click to expand each take</span></h2>`;
  html+=stories.map(storyHTML).join('');
  html+=`<h2 class="sec">🌶️ Hot takes</h2><div class="hot">`+DATA.hotTakes.map(t=>`<div class="hotcard"><div class="hh"><img src="${esc(av(t.avatar))}" loading="lazy" alt=""/><div><div class="name">${esc(t.name)}</div><a class="h" href="https://x.com/${esc(t.handle)}" target="_blank" rel="noopener">@${esc(t.handle)}</a></div></div><div class="body">${linkify(t.text)}</div><div class="eng" style="font-size:12px;color:var(--muted2)">❤ ${fmt(t.likes)} &nbsp; <a href="${t.url}" target="_blank" rel="noopener">view →</a></div></div>`).join('')+`</div>`;
  html+=`<h2 class="sec">👥 Builders featured (${DATA.people.length})</h2><div class="people">`+DATA.people.map(p=>`<a class="person" href="https://x.com/${esc(p.handle)}" target="_blank" rel="noopener"><img src="${esc(av(p.avatar))}" loading="lazy" alt=""/>@${esc(p.handle)}</a>`).join('')+`</div>`;
  document.getElementById('app').innerHTML=html;
}
function renderFilters(){
  const cats=['All',...new Set(DATA.stories.map(s=>s.category))];
  document.getElementById('filters').innerHTML=cats.map(c=>`<span class="chip${c===FILTER?' active':''}" onclick="setFilter('${esc(c)}')">${esc(c)}</span>`).join('');
}
function setFilter(c){FILTER=c;renderFilters();render();}

fetch('./data.json?cb='+Date.now()).then(r=>r.json()).then(d=>{
  DATA=d; const m=d.meta;
  const dt=iso=>new Date(iso).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  document.getElementById('pillbar').innerHTML=
    `<span class="pill">📅 <b>${esc(m.dayLabel)}</b></span>`+
    `<span class="pill">🕒 Updated <b>${dt(m.generatedAt)}</b></span>`+
    `<span class="pill">🧵 <b>${m.totalTakes}</b> takes across <b>${m.stories?d.stories.length:0}</b> stories</span>`+
    `<span class="pill">👤 <b>${m.peopleTracked}</b> builders tracked</span>`;
  document.getElementById('note').textContent='ℹ️ '+m.note;
  renderFilters(); render();
  document.getElementById('footer').innerHTML=`Auto-built daily from your X Following feed. Sources: ${m.sources.map(esc).join(' · ')}. · Last build ${dt(m.generatedAt)}`;
}).catch(e=>{document.getElementById('app').innerHTML='<div class="loading">Failed to load data.json — '+esc(e.message)+'</div>';});
</script>
</body>
</html>
